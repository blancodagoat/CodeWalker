name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: windows-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Strip leading 'v' from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Restore
        run: msbuild CodeWalker.sln /t:Restore /p:RuntimeIdentifiers=win-x64

      - name: Build Release
        run: msbuild CodeWalker.sln /p:Configuration=Release /p:RuntimeIdentifiers=win-x64 /m

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [ ! -d "x64/Release" ]; then
            echo "::error::x64/Release not found - PostBuild targets did not run"
            exit 1
          fi
          cp -r x64/Release/* artifacts/
          cp README.md artifacts/ 2>/dev/null || true
          find artifacts -name '*.pdb' -delete

      - name: List artifacts (debug)
        shell: bash
        run: ls -la artifacts/

      - name: Archive artifacts
        shell: pwsh
        run: Compress-Archive -Path artifacts\* -DestinationPath release.zip

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release.zip
          name: CodeWalker-Blanco-v${{ env.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false
